name: Build_ax6000_immortalwrt_237_110m

# Add a button to trigger the workflow
on: 
  repository_dispatch:
  workflow_dispatch:

  #schedule:
    #- cron: 10 18 1,8,15,22 * *
    # UTC 时间对应北京时间：每月2、9、16、23号，早上 2点10分 开始编译
    
jobs:
  build:
    # 建议 immortalwrt 使用低版本，更容易编译成功
    runs-on: ubuntu-22.04

    steps:
    - name: Before freeing up disk space
      run: |
        echo "Before freeing up disk space"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="
    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 2048
        temp-reserve-mb: 512
        swap-size-mb: 2048
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        overprovision-lvm: 'true'
        build-mount-path: '/builder'        

    - name: Symlink workspace to maximized mount
      run: |
        sudo mkdir -p /builder
        sudo chown -R runner:runner /builder
        sudo ln -sfn /builder $GITHUB_WORKSPACE || true
        ls -ld $GITHUB_WORKSPACE

    - name: Free up disk space complete
      run: |
        echo "Free up disk space complete"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

    - name: Checkout repository
      uses: actions/checkout@v7        

    # 如果“Initialization environment”报错，是因为官方 APT 设置依赖项的脚本已经不合时宜，在官方修正之前，请使用下方的代码
    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update
        sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh)'
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo rm -rf /etc/apt/sources.list.d/* /usr/local/lib/android /opt/ghc /usr/share/dotnet /usr/local/graalvm /usr/local/.ghcup \
        /usr/local/share/powershell /usr/local/share/chromium /usr/local/lib/node_modules
        sudo timedatectl set-timezone "Asia/Shanghai"
        sudo chown $USER:$GROUPS $GITHUB_WORKSPACE

    # 使用此代码前，请先更新依赖包的命令：https://github.com/sky2016cn/AutoBuild-lede（依赖包仓库） 
    #- name: Initialization environment
    #  env:
    #    DEBIAN_FRONTEND: noninteractive
    #  run: |  
    #    sudo -E apt-get -qq update
    #    sudo -E apt-get -qq install $(curl -fsSL raw.githubusercontent.com/sky2016cn/OpenWrt-Depends/main/depends-immortalwrt)
    #    sudo -E apt-get -qq autoremove --purge
    #    sudo -E apt-get -qq clean
    #    sudo rm -rf /etc/apt/sources.list.d/* /usr/local/lib/android /opt/ghc /usr/share/dotnet /usr/local/graalvm /usr/local/.ghcup \
    #    /usr/local/share/powershell /usr/local/share/chromium /usr/local/lib/node_modules
    #    sudo timedatectl set-timezone "Asia/Shanghai"
    #    sudo chown $USER:$GROUPS $GITHUB_WORKSPACE
        
    - name: Check Space
      run: |
        df -h

    - name: Clone source code
      env:
        REPO_URL: https://github.com/riches2020cn/immortalwrt-mt798x-6.6
      run: |
        # 编译自建 openwrt-24.10-6.6-ax6000-110m 分支（237_110m大分区）
        git clone -b openwrt-24.10-6.6-ax6000-110m --single-branch --filter=blob:none $REPO_URL immortalwrt || { echo 'Git clone failed!'; exit 1; }
        
        # ======== 编译下方插件，请先去掉注释 ======== 
        #cd immortalwrt
        
        # ======== 编译 OpenClash 最新版 =========
        # immortalwrt 插件库已经包含 OpenClash，若源码被删除或编译 OpenClash 最新版，使用以下命令自行编译，打开 immortalwrt官方插件库查询：https://github.com/immortalwrt/immortalwrt（选择 openwrt-24.10分支，打开 feeds.conf.default文件，再打开luci仓库找到“applications”查询插件）
        #sed -i '1i src-git openclash https://github.com/vernesong/OpenClash.git;master' ./feeds.conf.default
        
        # ======== 编译 passwall 最新版 =========
        # immortalwrt插件库已经包含 passwall，若源码被删除或编译 Passwall 最新版，使用以下命令自行编译，打开 immortalwrt官方插件库查询：https://github.com/immortalwrt/immortalwrt（选择 openwrt-24.10分支，打开 feeds.conf.default文件，再打开luci仓库找到“applications”查询插件）
        # 编译 passwall_luci，去掉下面注释，此命令会在 feeds.conf.default文件，第 1 行插入 passwall_luci
        #sed -i '1i src-git passwall_luci https://github.com/Openwrt-Passwall/openwrt-passwall.git;main' ./feeds.conf.default

        # 编译 passwall_packages，再次在 feeds.conf.default文件，第 1 行插入 passwall_packages (这样 packages 就变成了第 1 行，luci 变成了第 2 行)
        #sed -i '1i src-git passwall_packages https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git;main' ./feeds.conf.default
        
        # ======== 编译 passwall2 最新版 =========
        # 编译 passwall2_luci，不要和 passwall_luci 一起编译，编译出来的固件会不稳定，第 1 行插入 passwall2_luci
        #sed -i '1i src-git passwall2_luci https://github.com/Openwrt-Passwall/openwrt-passwall2.git;main' ./feeds.conf.default
        
    - name: Update feeds
      working-directory: ./immortalwrt
      run: |
        ./scripts/feeds update -a        

    - name: Install feeds
      working-directory: ./immortalwrt
      run: |
        ./scripts/feeds install -a

    - name: Install feeds
      working-directory: ./immortalwrt
      run: |
        ./scripts/feeds install -a

    # 编译 Passwall 最新版，若上方写入 feeds.conf.default 文件无法编译时，可使用 package 编译法
    #- name: Import external feeds & Custom Passwall
    #  working-directory: ./immortalwrt
    #  run: |
        # 1. 强行删除 feeds 自动生成的旧版快捷方式，防止与我们后续下载的最新版冲突
    #    rm -rf package/feeds/luci/luci-app-passwall
    #    rm -rf package/feeds/packages/passwall*
        
        # 2. 克隆最新版到本地高优先级目录（优先于 feeds 编译）
    #    mkdir -p package/custom-passwall
    #    git clone --depth 1 -b main https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git package/custom-passwall/packages
    #    git clone --depth 1 -b main https://github.com/Openwrt-Passwall/openwrt-passwall.git package/custom-passwall/luci

    # 编译 OpenClash 最新版，若上方写入 feeds.conf.default 文件无法编译时，可使用 package 编译法
    #- name: Import external feeds & Custom OpenClash
    #  working-directory: ./immortalwrt
    #  run: |
        # 1. 清理旧残留
    #    rm -rf package/feeds/luci/luci-app-openclash
        
        # 2. 把整个仓库临时克隆到一个临时目录
    #    git clone --depth 1 -b master https://github.com/vernesong/OpenClash.git ./openclash_tmp
        
        # 3. 创建标准的本地高优先级目录，并将核心插件子目录移入
    #    mkdir -p package/custom-openclash
    #    mv ./openclash_tmp/luci-app-openclash package/custom-openclash/
        
        # 4. 删掉临时仓库，保持源码树整洁
    #    rm -rf ./openclash_tmp
        

    - name: Configuration Customization - Build_ax6000_immortalwrt_237_110m 
      run: |
        # 在升级的分支，找到“Quickstart”下方：5. 看到 "# MT7986" 配置文件命令：cp -f defconfig/mt7986-ax6000.config .config 可确认该分支包含 红米AX6000官方原厂闭源
        # 将配置文件从 defconfig 目录复制到根目录并重命名 .config，云编译的目录和官方目录不同，所以命令中必须修改路径
        cp -f immortalwrt/defconfig/mt7986-ax6000.config immortalwrt/.config
        
        # 追加你要的插件配置，打开 feeds.conf.default文件，再打开luci仓库，选择“openwrt-24.10”分支，找到“applications”查询插件
        cat >> immortalwrt/.config <<EOF
        CONFIG_TARGET_mediatek=y
        CONFIG_TARGET_mediatek_filogic=y
        CONFIG_TARGET_mediatek_filogic_DEVICE_xiaomi_redmi-router-ax6000-110m=y
        CONFIG_PACKAGE_luci-app-autoreboot=y
        CONFIG_PACKAGE_luci-app-msd_lite=y
        CONFIG_PACKAGE_luci-app-openclash=y
        CONFIG_PACKAGE_luci-app-passwall=y
        CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Geoview=y
        # 不编译 haproxy 依赖（Passwall 负载均衡，效果并不好），启动会报错（仅限237大佬固件）
        # CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Haproxy is not set
        CONFIG_PACKAGE_luci-app-passwall_INCLUDE_ShadowsocksR_Libev_Client=y
        CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Shadowsocks_Rust_Client=y
        CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Simple_Obfs=y
        CONFIG_PACKAGE_luci-app-passwall_INCLUDE_SingBox=y
        CONFIG_PACKAGE_luci-app-passwall_INCLUDE_V2ray_Plugin=y
        CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Xray=y
        CONFIG_PACKAGE_luci-app-passwall_Nftables_Transparent_Proxy=y
        EOF
        
        # Modify default IP 将默认IP地址 192.168.6.1 修改为 192.168.2.1
        sed -i 's/192.168.6.1/192.168.2.1/g' immortalwrt/package/base-files/files/bin/config_generate
        cd immortalwrt && make defconfig

    - name: Download package
      working-directory: ./immortalwrt
      run: |
        make download -j$(nproc)
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Build firmware
      working-directory: ./immortalwrt
      run: |
        echo -e "$(nproc) thread build."
        # 先尝试多线程全速编译，如果失败（返回非 0 状态码），则触发单线程编译，并打印最详细的 V=s 日志
        make -j$(nproc) || make -j1 V=s

    - name: Check Space
      run: |
        df -h
        
    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: ax6000_immortalwrt
        path: immortalwrt/bin
