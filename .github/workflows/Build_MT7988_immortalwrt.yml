name: Build_MT7988_immortalwrt

# Add a button to trigger the workflow
on: 
  repository_dispatch:
  workflow_dispatch:

  #schedule:
    #- cron: 10 18 1,8,15,22 * *
    # UTC 时间对应北京时间：每月2、9、16、23号，早上 2点10分 开始编译
    
jobs:
  build:
    # 建议 immortalwrt 使用低版本，更容易编译成功
    runs-on: ubuntu-22.04

    steps:
    - name: Before freeing up disk space
      run: |
        echo "Before freeing up disk space"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="
    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 2048
        temp-reserve-mb: 512
        swap-size-mb: 2048
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        overprovision-lvm: 'true'
        build-mount-path: '/builder'        

    - name: Symlink workspace to maximized mount
      run: |
        sudo mkdir -p /builder
        sudo chown -R runner:runner /builder
        sudo ln -sfn /builder $GITHUB_WORKSPACE || true
        ls -ld $GITHUB_WORKSPACE

    - name: Free up disk space complete
      run: |
        echo "Free up disk space complete"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

    - name: Checkout repository
      uses: actions/checkout@v6        

    # 如果“Initialization environment”报错，是因为官方 APT 设置依赖项的脚本已经不合时宜，在官方修正之前，请使用下方的代码
    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update
        sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh)'
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo rm -rf /etc/apt/sources.list.d/* /usr/local/lib/android /opt/ghc /usr/share/dotnet /usr/local/graalvm /usr/local/.ghcup \
        /usr/local/share/powershell /usr/local/share/chromium /usr/local/lib/node_modules
        sudo timedatectl set-timezone "Asia/Shanghai"
        sudo chown $USER:$GROUPS $GITHUB_WORKSPACE

    # 使用此代码前，请先更新依赖包的命令：https://github.com/sky2016cn/AutoBuild-lede（依赖包仓库） 
    #- name: Initialization environment
    #  env:
    #    DEBIAN_FRONTEND: noninteractive
    #  run: |  
    #    sudo -E apt-get -qq update
    #    sudo -E apt-get -qq install $(curl -fsSL raw.githubusercontent.com/sky2016cn/OpenWrt-Depends/main/depends-immortalwrt)
    #    sudo -E apt-get -qq autoremove --purge
    #    sudo -E apt-get -qq clean
    #    sudo rm -rf /etc/apt/sources.list.d/* /usr/local/lib/android /opt/ghc /usr/share/dotnet /usr/local/graalvm /usr/local/.ghcup \
    #    /usr/local/share/powershell /usr/local/share/chromium /usr/local/lib/node_modules
    #    sudo timedatectl set-timezone "Asia/Shanghai"
    #    sudo chown $USER:$GROUPS $GITHUB_WORKSPACE
        
    - name: Check Space
      run: |
        df -h

    # 注意：强烈不建议自行更新源码中的插件，导致编译失败，也不建议添加第三方插件，造成固件不稳定
    - name: Clone source code
      env:
        REPO_URL: https://github.com/padavanonly/immortalwrt-mt798x-24.10
      run: |
        # 打开官网：https://github.com/padavanonly/immortalwrt-mt798x-6.6/tree/mt798x-mt799x-6.6-mtwifi
        # 在 mt798x-mt799x-6.6-mtwifi 分支，找到“Quickstart”下方：5. 看到 "# MT7988_mt7990" 配置文件命令：cp -f defconfig/mt7988_mt7990.config .config 可确认该分支包含 mt7988/7986 专属的 Linux 6.6 内核原厂闭源无线驱动
        # 获取克隆命令：找到“Quickstart”下方：1. 克隆命令中包含“https://github.....”，替换上方变量“REPO_URL: https://github.....”
        git clone -b mt798x-mt799x-6.6-mtwifi --single-branch --filter=blob:none $REPO_URL immortalwrt || { echo 'Git clone failed!'; exit 1; }
        
    - name: Update feeds
      working-directory: ./immortalwrt
      run: |
        ./scripts/feeds update -a        

    - name: Install feeds
      working-directory: ./immortalwrt
      run: |
        ./scripts/feeds install -a

    - name: Install feeds
      working-directory: ./immortalwrt
      run: |
        ./scripts/feeds install -a

    - name: Configuration Customization - Build_MT7988_immortalwrt 
      run: |
        # 在 mt798x-mt799x-6.6-mtwifi 分支，找到“Quickstart”下方：5. 看到 "# MT7988_mt7990" 配置文件命令：cp -f defconfig/mt7988_mt7990.config .config 可确认该分支包含 mt7988/7986 专属的 Linux 6.6 内核原厂闭源无线驱动
        # 将配置文件从 defconfig 目录复制到根目录并重命名 .config，云编译的目录和官方目录不同，所以命令中必须修改路径     
        cp -f immortalwrt/defconfig/mt7988_mt7990.config immortalwrt/.config
    
        # 追加你要的插件配置，打开 feeds.conf.default文件，再打开luci仓库，选择“openwrt-24.10”分支，找到“applications”查询插件
        cat >> immortalwrt/.config <<EOF
        CONFIG_PACKAGE_luci-app-msd_lite=y
        CONFIG_PACKAGE_luci-app-openclash=y
        CONFIG_PACKAGE_luci-app-passwall=y
        EOF

        # 消除刚才追加内容中携带的行首空格
        sed -i 's/^[ \t]*//g' immortalwrt/.config 
        
        # 导入 customize_immortalwrt.sh 文件
        chmod +x ./customize_immortalwrt.sh && ./customize_immortalwrt.sh
        cd immortalwrt && make defconfig
              
    - name: Download package
      working-directory: ./immortalwrt
      run: |
        make download -j$(nproc)
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Build firmware
      working-directory: ./immortalwrt
      run: |
        echo -e "$(nproc) thread build."
        # 先尝试多线程全速编译，如果失败（返回非 0 状态码），则触发单线程编译，并打印最详细的 V=s 日志
        make -j$(nproc) || make -j1 V=s

    - name: Check Space
      run: |
        df -h
        
    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: ax6000_immortalwrt
        path: immortalwrt/bin
