name: Build_ax6000_LEDE_110m

# Add a button to trigger the workflow
on: 
  repository_dispatch:
  workflow_dispatch:

  #schedule:
    #- cron: 10 18 1,8,15,22 * *
    # UTC 时间对应北京时间：每月2、9、16、23号，早上 2点10分 开始编译
    
jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Before freeing up disk space
      run: |
        echo "Before freeing up disk space"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="
    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 2048
        temp-reserve-mb: 512
        swap-size-mb: 2048
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        overprovision-lvm: 'true'
        build-mount-path: '/builder'        

    - name: Symlink workspace to maximized mount
      run: |
        sudo mkdir -p /builder
        sudo chown -R runner:runner /builder
        sudo ln -sfn /builder $GITHUB_WORKSPACE || true
        ls -ld $GITHUB_WORKSPACE

    - name: Free up disk space complete
      run: |
        echo "Free up disk space complete"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

    - name: Checkout repository
      uses: actions/checkout@v7        

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        # 1. 调用 OpenWrt-Depends 仓库下的"update_dependency_LEDE.yml"脚本，自动安装依赖包
        echo "=== 开始安装 OpenWrt 编译依赖 ==="
        curl -fsSL https://raw.githubusercontent.com/sky2016cn/OpenWrt-Depends/main/depends-lede | sudo bash
                
        # 2. 清理系统无用软件包，释放磁盘空间
        echo "=== 正在清理临时文件和无用缓存 ==="
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo rm -rf /etc/apt/sources.list.d/* /usr/local/lib/android /opt/ghc /usr/share/dotnet /usr/local/graalvm /usr/local/.ghcup \
        /usr/local/share/powershell /usr/local/share/chromium /usr/local/lib/node_modules
        
        # 3. 设置时区并修正工作区权限
        sudo timedatectl set-timezone "Asia/Shanghai"
        sudo chown $USER:$GROUPS $GITHUB_WORKSPACE
        echo "✅ 环境初始化完毕！"

    - name: Check Space
      run: |
        df -h
        
    - name: Clone source code
      env: 
        REPO_URL: https://github.com/coolsnowwolf/lede
      run: |
        git clone --depth 1 -b master $REPO_URL openwrt || { echo 'Git clone failed!'; exit 1; }
        
        # ======== 编译下方插件，请先去掉注释 ======== 
        #cd openwrt
        
        # ======== 切换 luci 仓库：openwrt-23.05去掉注释，注释掉 openwrt-25.12 =========
        #sed -i 's|^#\(src-git luci .*openwrt-23\.05\)|\1|' ./feeds.conf.default
        #sed -i 's|^\(src-git luci .*openwrt-25\.12\)|#\1|' ./feeds.conf.default
        
        # ======== 编译 helloworld =========
        #echo "src-git helloworld https://github.com/fw876/helloworld.git" >> ./feeds.conf.default
        
        # ======== 编译 OpenClash 最新版 =========
        # Lede插件库已经包含 OpenClash，若源码被删除或编译 OpenClash 最新版，使用以下命令自行编译，打开Lede官方插件库查询：https://github.com/coolsnowwolf/lede/blob/master/feeds.conf.default（注意 luci后面的分支，打开 luci仓库中正确的分支找到“applications”查询插件）
        #sed -i '1i src-git openclash https://github.com/vernesong/OpenClash.git;master' ./feeds.conf.default
        
        # ======== 编译 Passwall 最新版 =========
        # Lede插件库已经包含 Passwall，若源码被删除或编译 Passwall 最新版，使用以下命令自行编译，打开Lede官方插件库查询：https://github.com/coolsnowwolf/lede/blob/master/feeds.conf.default（注意 luci后面的分支，打开 luci仓库中正确的分支找到“applications”查询插件）   
        # 编译 passwall_luci，去掉下面注释，此命令会在 feeds.conf.default文件，第 1 行插入 passwall_luci
        #sed -i '1i src-git passwall_luci https://github.com/Openwrt-Passwall/openwrt-passwall.git;main' ./feeds.conf.default

        # 编译 passwall2_luci，不要和 passwall_luci 一起编译，编译出来的固件会不稳定，第 1 行插入 passwall2_luci    
        #sed -i '1i src-git passwall2_luci https://github.com/Openwrt-Passwall/openwrt-passwall2.git;main' ./feeds.conf.default

        # 编译 passwall_packages，再次在 feeds.conf.default文件，第 1 行插入 passwall_packages (这样 packages 就变成了第 1 行，luci 变成了第 2 行)
        #sed -i '1i src-git passwall_packages https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git;main' ./feeds.conf.default
               
    - name: Update feeds
      working-directory: ./openwrt
      run: |
        ./scripts/feeds update -a     

    - name: Install feeds
      working-directory: ./openwrt
      run: |
        ./scripts/feeds install -a

    - name: Install feeds
      working-directory: ./openwrt
      run: |
        ./scripts/feeds install -a

    # 范例 1: 注意拉取命令的保存路径，添加源码中没有的第三方插件，必须放在 feeds命令之后，打开Lede官方插件库查询：https://github.com/coolsnowwolf/lede/blob/master/feeds.conf.default（打开luci仓库找到“applications”查询插件）
    #- name: Import external feeds - OpenAppFilter
    #  working-directory: ./openwrt
    #  run: |
    #    git clone https://github.com/destan19/OpenAppFilter.git package/OpenAppFilter

    - name: Configuration Customization - Build_ax6000_LEDE_110m
      env:
        CONFIG_FILE: 'ax6000_LEDE_110m.config'
      run: |
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x ./customize.sh && ./customize.sh
        cd openwrt && make defconfig
        
    - name: Download package
      working-directory: ./openwrt
      run: |
        make download -j$(nproc)
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Build firmware
      working-directory: ./openwrt
      run: |
        echo -e "$(nproc) thread build."
        # 先尝试多线程全速编译，如果失败（返回非 0 状态码），则触发单线程编译，并打印最详细的 V=s 日志
        make -j$(nproc) || make -j1 V=s

    - name: Check Space
      run: |
        df -h
        
    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: ax6000
        path: openwrt/bin
